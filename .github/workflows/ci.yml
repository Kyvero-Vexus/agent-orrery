# Agent Orrery — CI Pipeline
# Bead: agent-orrery-vbc
#
# Runs on every push/PR to master: type checks, unit tests, E2E gates.
# Includes Web Playwright (S1-S8) and TUI mcp-tui-driver (T1-T8).
# Produces machine-readable artifacts for evidence verification.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SBCL_VERSION: "2.5.8"
  LD_LIBRARY_PATH: /lib/x86_64-linux-gnu

jobs:
  type-check:
    name: Type Policy Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Run type checks
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --load ci/check-types.lisp

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Run tests
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --script ci/run-tests.lisp

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Run E2E smoke
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --load ci/e2e-smoke.lisp

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run web E2E
        working-directory: e2e
        run: bash run-e2e.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-report
          path: test-results/e2e-report/

  tui-e2e:
    name: TUI E2E (mcp-tui-driver)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (SBCL + Rust + Node)
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev cargo nodejs npm

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Install mcp-tui-driver
        run: |
          cargo install --git https://github.com/michaellee8/mcp-tui-driver

      - name: Run TUI E2E
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          make e2e-tui

      - name: Upload TUI E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tui-e2e-artifacts
          path: test-results/tui-artifacts/

  evidence-gate:
    name: E2E Evidence Gate (Playwright + mcp-tui-driver)
    runs-on: ubuntu-latest
    needs: [web-e2e, tui-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Download web E2E artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-e2e-report
          path: test-results/e2e-report/

      - name: Download TUI E2E artifacts
        uses: actions/download-artifact@v4
        with:
          name: tui-e2e-artifacts
          path: test-results/tui-artifacts/

      - name: Validate deterministic evidence manifests
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --script ci/check-evidence.lisp

  adapter-contract-gate:
    name: Adapter Contract Checker Gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Validate typed adapter contract checker
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --script ci/check-adapter-contract-checker.lisp

  evidence-recertification-gate:
    name: Evidence Recertification Gate
    runs-on: ubuntu-latest
    needs: [web-e2e, tui-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Download web E2E artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-e2e-report
          path: test-results/e2e-report/

      - name: Download TUI E2E artifacts
        uses: actions/download-artifact@v4
        with:
          name: tui-e2e-artifacts
          path: test-results/tui-artifacts/

      - name: Validate cross-ui evidence recertification
        run: |
          sbcl --noinform --non-interactive \
            --eval '(load "~/quicklisp/setup.lisp")' \
            --script ci/check-evidence-recertification.lisp

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [type-check, test, evidence-gate, adapter-contract-gate, evidence-recertification-gate]
    strategy:
      matrix:
        target: [cli, tui, web]
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libssl-dev

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/ql.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/ql.lisp \
            --eval '(quicklisp-quickstart:install :path "~/quicklisp/")' \
            --eval '(ql-dist:install-dist "http://beta.quicklisp.org/dist/quicklisp.txt" :prompt nil)'

      - name: Build ${{ matrix.target }}
        working-directory: packaging
        run: make ${{ matrix.target }} QL_SETUP=~/quicklisp/setup.lisp

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/
