name: CI — Type Policy & Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  type-check:
    name: Type Policy Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL + Quicklisp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbcl
          # Install Quicklisp
          curl -sO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval '(ql-util:without-prompting (ql:add-to-init-file))' \
               --eval '(sb-ext:exit)'

      - name: Run type policy check
        run: sbcl --load ci/check-types.lisp

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL + Quicklisp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbcl
          curl -sO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval '(ql-util:without-prompting (ql:add-to-init-file))' \
               --eval '(sb-ext:exit)'

      - name: Run test suite
        run: sbcl --load ci/run-tests.lisp

      - name: Run E2E smoke (fixture runtime)
        run: sbcl --load ci/e2e-smoke.lisp | tee e2e-smoke-output.txt

      - name: Upload E2E smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-output
          path: e2e-smoke-output.txt
